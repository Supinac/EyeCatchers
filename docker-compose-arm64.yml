services:
  db:
    image: mysql:8.0
    platform: linux/arm64
    environment:
      MYSQL_DATABASE: eyecatchers
      MYSQL_USER: eyecatchers
      MYSQL_PASSWORD: something
      MYSQL_ROOT_PASSWORD: pja98fbe
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.arm64
    platform: linux/arm64
    environment:
    
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: eyecatchers
      DB_USER: eyecatchers
      DB_PASSWORD: pja98fbe
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped
